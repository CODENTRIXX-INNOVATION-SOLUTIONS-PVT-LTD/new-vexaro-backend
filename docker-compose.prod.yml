version: '3.8'

# Production Docker Compose Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  mongodb-primary:
    # Production: Use managed MongoDB Atlas or external replica set cluster
    # This is a placeholder - replace with your production MongoDB connection
    environment:
      # Add production-specific MongoDB configuration
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    volumes:
      # Use named volumes or external storage for production
      - mongodb-prod-data:/data/db
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: always

  redis:
    # Production: Consider Redis Cluster or managed service (AWS ElastiCache, Redis Cloud)
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-prod-data:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: always

  backend:
    # Production image from registry
    image: ${DOCKER_REGISTRY}/vexaro-backend:${VERSION:-latest}
    environment:
      NODE_ENV: production
      
      # Override with production values from secrets
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: ${REDIS_URL}
      
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: production
      SENTRY_RELEASE: ${VERSION:-latest}
      
      # Production URLs
      FRONTEND_URL: ${FRONTEND_URL}
      
      # Stricter rate limits for production
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 50
      
    # Use external log volume or log aggregation service
    volumes:
      - backend-logs:/app/logs
    
    deploy:
      replicas: 3  # Scale horizontally
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    
    restart: always
    
    # Production health check - more aggressive
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: false  # Set to true if application doesn't need write access
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=vexaro-backend"
        env: "NODE_ENV,VERSION"

  # Remove mongo-express from production
  mongo-express:
    profiles:
      - dev
      - debug

volumes:
  mongodb-prod-data:
    driver: local
    # For production, use external storage driver:
    # driver: aws-ebs / gcePersistentDisk / azurefile
  redis-prod-data:
    driver: local
  backend-logs:
    driver: local

# Production network with encryption
networks:
  vexaro-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: vexaro-prod
    ipam:
      config:
        - subnet: 172.28.0.0/16
