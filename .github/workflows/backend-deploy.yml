name: Backend Production Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - backend-runner

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Go to Backend Directory
        run: |
          cd /var/www/vexaro/new-vexaro-backend
          git fetch origin
          git reset --hard origin/main

      - name: Install Dependencies
        run: |
          cd /var/www/vexaro/new-vexaro-backend
          npm ci

      - name: Restart PM2
        run: |
          pm2 restart vexaro-backend
          pm2 save

      - name: Verify PM2
        run: |
          pm2 status

      - name: Health Check
        run: |
          sleep 10
          curl -f http://localhost:5000/ || exit 1
