name: Backend Production Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Backend
    runs-on:
      - self-hosted
      - Linux
      - X64
      - backend

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Backend Code
        run: |
          cd /var/www/vexaro/new-vexaro-backend
          git fetch origin
          git reset --hard origin/main

      - name: Install Dependencies
        run: |
          cd /var/www/vexaro/new-vexaro-backend
          npm ci

      - name: Restart Backend
        run: |
          pm2 reload vexaro-backend
          pm2 save

      - name: Verify PM2 Status
        run: |
          pm2 status

      - name: Backend Health Check
        run: |
          sleep 10
          curl -f http://localhost:5000/health || \
          curl -f http://localhost:5000 || exit 1
